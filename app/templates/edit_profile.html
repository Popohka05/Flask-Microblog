{% extends "base.html" %}

{% block content %}
<section class="panel form-panel">
  <h1>Edit profile</h1>
  <form method="post" class="form-grid">
    <label>Username
      <input type="text" name="username" value="{{ current_user.username }}" required maxlength="80">
    </label>
    <label>About me
      <textarea name="about_me" rows="4" maxlength="280">{{ current_user.about_me }}</textarea>
    </label>
    <button type="submit">Save changes</button>
  </form>
</section>
{% endblock %}
